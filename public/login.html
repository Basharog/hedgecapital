<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HedgeCapitalPro — Client Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a12;--surface:#0b1120;--surface2:#101828;
  --border:rgba(100,160,220,0.12);--border2:rgba(100,160,220,0.2);
  --accent:#00d9b5;--red:#ff4d6a;--yellow:#ffb830;
  --text:#dce6f0;--muted:#5a7095;
  --head:'Syne',sans-serif;--body:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 20px 40px;position:relative;overflow:hidden}

/* ── BACKGROUND ── */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 75%);pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,217,181,.07) 0%,transparent 70%);top:-150px;right:-100px;pointer-events:none}
.glow2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(20,102,255,.04) 0%,transparent 70%);bottom:-100px;left:-50px;pointer-events:none}

/* ── NAV ── */
.nav-top{position:fixed;top:0;left:0;right:0;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;z-index:10;background:rgba(6,10,18,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--head);font-size:17px;font-weight:800;color:#fff;text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-back{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--text)}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:44px 40px;width:100%;max-width:440px;position:relative;z-index:1;animation:cardIn .4s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.logo{font-family:var(--head);font-size:22px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px}
.logo span{color:var(--accent)}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6}

/* ── ALERTS ── */
.alert{border-radius:4px;padding:11px 14px;font-size:13px;margin-bottom:18px;display:none;line-height:1.55;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.alert-err{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);color:var(--red)}
.alert-ok{background:rgba(0,217,181,.08);border:1px solid rgba(0,217,181,.25);color:var(--accent)}
.alert-warn{background:rgba(255,184,48,.07);border:1px solid rgba(255,184,48,.22);color:var(--yellow)}
.alert.show{display:block}

/* ── FORM ── */
.form-group{margin-bottom:18px;position:relative}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:12px 16px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,217,181,.08)}
.form-group input.err{border-color:var(--red)}

.pass-toggle{position:absolute;right:14px;bottom:13px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1;transition:color .2s}
.pass-toggle:hover{color:var(--text)}

.form-row-inline{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.remember input{width:auto;accent-color:var(--accent);cursor:pointer}
.forgot{font-size:13px;color:var(--accent);text-decoration:none;transition:opacity .2s}
.forgot:hover{opacity:.75}

/* ── BUTTON ── */
.btn-full{width:100%;background:var(--accent);color:#060a12;padding:13px;border-radius:4px;font-family:var(--body);font-weight:700;font-size:14px;border:none;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-full:hover{opacity:.87}
.btn-full:active{transform:scale(.99)}
.btn-full:disabled{opacity:.5;cursor:not-allowed}

/* ── SPINNER ── */
.spinner{width:16px;height:16px;border:2px solid rgba(6,10,18,.3);border-top-color:#060a12;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:block}
.loading .btn-text{display:none}

/* ── DIVIDER / LINKS ── */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.register-link{text-align:center;font-size:13px;color:var(--muted)}
.register-link a{color:var(--accent);text-decoration:none;font-weight:600}
.register-link a:hover{opacity:.8}

/* ── RESEND BAR ── */
.resend-bar{text-align:center;margin-top:10px;font-size:13px;color:var(--muted);display:none}
.resend-bar a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
.resend-bar a:hover{opacity:.8}
.resend-bar.show{display:block}

@media(max-width:480px){.card{padding:32px 22px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="glow2"></div>

<nav class="nav-top">
  <a href="index.html" class="nav-logo">Hedge<span>Capital</span>Pro</a>
  <a href="index.html" class="nav-back">← Back to Website</a>
</nav>

<div class="card">
  <div class="logo">Hedge<span>Capital</span>Pro</div>
  <div class="card-sub">Sign in to your investment portal</div>

  <!-- Alerts -->
  <div class="alert alert-ok"   id="alert-ok"></div>
  <div class="alert alert-warn" id="alert-warn"></div>
  <div class="alert alert-err"  id="alert-err"></div>

  <!-- Form -->
  <div class="form-group">
    <label>Email or Username</label>
    <input type="text" id="login-id" placeholder="john@example.com" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="pass-toggle" onclick="togglePass()" type="button" id="pass-eye">👁</button>
  </div>
  <div class="form-row-inline">
    <label class="remember"><input type="checkbox" id="remember"> Remember me</label>
    <a href="forgot-password.html" class="forgot">Forgot password?</a>
  </div>

  <button class="btn-full" id="login-btn" onclick="doLogin()">
    <div class="spinner"></div>
    <span class="btn-text">Sign In →</span>
  </button>

  <div class="resend-bar" id="resend-bar">
    Didn't get the confirmation email?
    <a onclick="doResend()">Resend it</a>
  </div>

  <div class="divider">or</div>
  <div class="register-link">Don't have an account? <a href="register.html">Create one free</a></div>
</div>

<script type="module">
import { login, redirectIfLoggedIn, resendConfirmation, getUrlParam } from './auth.js';

// ── REDIRECT IF ALREADY LOGGED IN ─────────────────────────
await redirectIfLoggedIn('dashboard.html');

// ── URL PARAMS ─────────────────────────────────────────────
const verified   = getUrlParam('verified');
const suspended  = getUrlParam('suspended');
const registered = getUrlParam('registered');
const redirect   = getUrlParam('redirect') || 'dashboard.html';

if (verified)   showAlert('ok',   '✓ Email confirmed! You can now sign in.');
if (suspended)  showAlert('warn', '⚠ Your account has been suspended. Contact support.');
if (registered) showAlert('ok',   '✓ Account created! Please check your email to confirm your account before signing in.');

// ── LOGIN ──────────────────────────────────────────────────
let lastEmail = '';

window.doLogin = async function() {
  const id   = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value;

  clearAlerts();
  if (!id || !pass) { showAlert('err', 'Please fill in all fields.'); return; }

  setLoading(true);
  const { data, profile, error } = await login({ identifier: id, password: pass });
  setLoading(false);

  if (error === 'email_not_confirmed') {
    lastEmail = id.includes('@') ? id : '';
    showAlert('warn', '⚠ Please confirm your email before signing in. Check your inbox.');
    document.getElementById('resend-bar').classList.add('show');
    return;
  }
  if (error === 'suspended') {
    showAlert('err', '⚠ Your account has been suspended. Contact support for assistance.');
    return;
  }
  if (error) {
    showAlert('err', error);
    return;
  }

  // Success → redirect
  window.location.href = profile?.role === 'admin' ? 'admin.html' : redirect;
};

// ── RESEND CONFIRMATION ────────────────────────────────────
window.doResend = async function() {
  const id = document.getElementById('login-id').value.trim() || lastEmail;
  if (!id || !id.includes('@')) {
    showAlert('err', 'Enter your email address above, then click Resend.');
    return;
  }
  setLoading(true);
  const { error } = await resendConfirmation(id);
  setLoading(false);
  if (error) { showAlert('err', error); return; }
  showAlert('ok', '✓ Confirmation email resent! Check your inbox.');
};

// ── ENTER KEY ──────────────────────────────────────────────
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
document.getElementById('login-id').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});

// ── HELPERS ────────────────────────────────────────────────
window.togglePass = function() {
  const inp = document.getElementById('login-pass');
  const eye = document.getElementById('pass-eye');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.textContent = inp.type === 'password' ? '👁' : '🙈';
};

function setLoading(on) {
  const btn = document.getElementById('login-btn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

function clearAlerts() {
  ['alert-ok','alert-warn','alert-err'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('show');
    el.textContent = '';
  });
}

function showAlert(type, msg) {
  clearAlerts();
  const el = document.getElementById(`alert-${type}`);
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
