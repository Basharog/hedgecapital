<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HedgeCapitalPro — Client Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a12;--surface:#0b1120;--surface2:#101828;--border:rgba(100,160,220,0.12);--border2:rgba(100,160,220,0.2);--accent:#00d9b5;--red:#ff4d6a;--text:#dce6f0;--muted:#5a7095;--head:'Syne',sans-serif;--body:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 75%);pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,217,181,.06) 0%,transparent 70%);top:-150px;right:-100px;pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:48px 40px;width:100%;max-width:440px;position:relative;z-index:1}
.back-link{position:absolute;top:28px;left:0;right:0;text-align:center;display:block}
.back-a{color:var(--muted);text-decoration:none;font-size:12px;letter-spacing:.5px;transition:color .2s;display:inline-flex;align-items:center;gap:6px}
.back-a:hover{color:var(--accent)}
.logo{font-family:var(--head);font-size:22px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px}
.logo span{color:var(--accent)}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:12px 16px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-row-inline{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.remember input{width:auto;margin:0;accent-color:var(--accent)}
.forgot{font-size:13px;color:var(--accent);text-decoration:none;transition:opacity .2s}
.forgot:hover{opacity:.75}
.btn-full{width:100%;background:var(--accent);color:#060a12;padding:13px;border-radius:4px;font-family:var(--body);font-weight:700;font-size:14px;border:none;cursor:pointer;transition:opacity .2s;letter-spacing:.3px}
.btn-full:hover{opacity:.85}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.register-link{text-align:center;font-size:13px;color:var(--muted)}
.register-link a{color:var(--accent);text-decoration:none;font-weight:600}
.register-link a:hover{opacity:.75}
.err-msg{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);border-radius:4px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
.nav-top{position:fixed;top:0;left:0;right:0;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.nav-logo{font-family:var(--head);font-size:17px;font-weight:800;color:#fff;text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-back{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<nav class="nav-top">
  <a href="index.html" class="nav-logo">Hedge<span>Capital</span>Pro</a>
  <a href="index.html" class="nav-back">← Back to Website</a>
</nav>

<div class="card">
  <div class="logo">Hedge<span>Capital</span>Pro</div>
  <div class="card-sub">Sign in to your investment portal</div>

  <div class="err-msg" id="err-msg">Invalid email/username or password.</div>

  <div class="form-group">
    <label>Email or Username</label>
    <input type="text" id="login-id" placeholder="john@example.com" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="form-row-inline">
    <label class="remember"><input type="checkbox" id="remember"> Remember me</label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <button class="btn-full" onclick="doLogin()">Sign In →</button>

  <div class="divider">or</div>
  <div class="register-link">Don't have an account? <a href="register.html">Create one free</a></div>
</div>

<script>
function doLogin(){
  const id = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('err-msg');

  if(!id || !pass){ err.style.display='block'; err.textContent='Please fill in all fields.'; return; }

  // Check registered users
  const users = JSON.parse(localStorage.getItem('hcp_users')||'[]');
  const user = users.find(u=> (u.email===id||u.username===id) && u.password===pass);

  // Demo account
  if((id==='demo'||id==='demo@hedgecapitalpro.com') && pass==='demo123'){
    const demo = getDemoUser();
    localStorage.setItem('hcp_session', JSON.stringify(demo));
    window.location.href='dashboard.html';
    return;
  }

  if(user){
    localStorage.setItem('hcp_session', JSON.stringify(user));
    window.location.href='dashboard.html';
  } else {
    err.style.display='block';
    err.textContent='Invalid email/username or password.';
  }
}

function getDemoUser(){
  return {
    id:'demo001', firstName:'Alex', lastName:'Morgan', email:'demo@hedgecapitalpro.com',
    username:'demo', country:'United States', phone:'+1 555-0100', referralCode:'DEMO001',
    balance:12480.50, invested:10000, profit:2480.50, totalWithdrawn:0,
    joinDate:'2024-10-15',
    plans:[
      {id:'p1',name:'Silver Growth',amount:5000,daily:10,days:21,daysLeft:8,status:'active',earned:1300},
      {id:'p2',name:'Bronze Starter',amount:5000,daily:7,days:14,daysLeft:2,status:'active',earned:1180}
    ],
    transactions:[
      {id:'t1',type:'deposit',method:'Bitcoin',amount:5000,status:'confirmed',date:'2025-03-01',txid:'bc1q...abc'},
      {id:'t2',type:'deposit',method:'USDT (TRC20)',amount:5000,status:'confirmed',date:'2025-02-10',txid:'TXabc...xyz'},
      {id:'t3',type:'profit',method:'Silver Growth',amount:1300,status:'credited',date:'2025-03-20',txid:'—'},
      {id:'t4',type:'profit',method:'Bronze Starter',amount:1180,status:'credited',date:'2025-03-22',txid:'—'},
    ]
  };
}

// Auto-login if session exists
if(localStorage.getItem('hcp_session')) window.location.href='dashboard.html';
</script>
</body>
</html>
