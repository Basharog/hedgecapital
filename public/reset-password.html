<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HedgeCapitalPro — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a12;--surface:#0b1120;--surface2:#101828;
  --border:rgba(100,160,220,0.12);--border2:rgba(100,160,220,0.2);
  --accent:#00d9b5;--red:#ff4d6a;
  --text:#dce6f0;--muted:#5a7095;
  --head:'Syne',sans-serif;--body:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 20px 40px;position:relative;overflow:hidden}

.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 75%);pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,217,181,.07) 0%,transparent 70%);top:-150px;right:-100px;pointer-events:none}

.nav-top{position:fixed;top:0;left:0;right:0;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;z-index:10;background:rgba(6,10,18,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--head);font-size:17px;font-weight:800;color:#fff;text-decoration:none}
.nav-logo span{color:var(--accent)}

.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1;animation:cardIn .4s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card-icon{width:52px;height:52px;border-radius:12px;background:rgba(0,217,181,.1);border:1px solid rgba(0,217,181,.2);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 20px}
.logo{font-family:var(--head);font-size:21px;font-weight:800;color:#fff;text-align:center;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:30px;line-height:1.65}

/* Alerts */
.alert{border-radius:4px;padding:11px 14px;font-size:13px;margin-bottom:18px;display:none;line-height:1.55;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.alert-err{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);color:var(--red)}
.alert-ok{background:rgba(0,217,181,.08);border:1px solid rgba(0,217,181,.25);color:var(--accent)}
.alert.show{display:block}

/* Form */
.form-group{margin-bottom:16px;position:relative}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:12px 16px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,217,181,.08)}

.pass-toggle{position:absolute;right:14px;bottom:13px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;transition:color .2s}
.pass-toggle:hover{color:var(--text)}

.strength-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:11px;color:var(--muted);margin-top:5px;min-height:16px}

.btn-full{width:100%;background:var(--accent);color:#060a12;padding:13px;border-radius:4px;font-family:var(--body);font-weight:700;font-size:14px;border:none;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.btn-full:hover{opacity:.87}
.btn-full:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(6,10,18,.3);border-top-color:#060a12;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:block}
.loading .btn-text{display:none}

/* Invalid link view */
.invalid-view{display:none;text-align:center}
.invalid-view.show{display:block}
.invalid-view .big-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.invalid-view h2{font-family:var(--head);font-size:20px;color:#fff;margin-bottom:10px}
.invalid-view p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px}
.btn-outline{display:inline-flex;padding:11px 24px;border-radius:4px;border:1px solid var(--border2);color:var(--text);font-family:var(--body);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:480px){.card{padding:32px 20px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<nav class="nav-top">
  <a href="index.html" class="nav-logo">Hedge<span>Capital</span>Pro</a>
</nav>

<div class="card">

  <!-- Invalid / expired link -->
  <div class="invalid-view" id="invalid-view">
    <div class="big-icon">⚠️</div>
    <h2>Link expired or invalid</h2>
    <p>This password reset link has expired or already been used. Reset links are valid for 1 hour.</p>
    <a href="forgot-password.html" class="btn-outline">Request a new link →</a>
  </div>

  <!-- Reset form -->
  <div id="reset-view">
    <div class="card-icon">🔐</div>
    <div class="logo">Set New Password</div>
    <div class="card-sub">Choose a strong password for your HedgeCapitalPro account.</div>

    <div class="alert alert-err" id="alert-err"></div>
    <div class="alert alert-ok"  id="alert-ok"></div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-pass" placeholder="Min. 8 characters">
      <button class="pass-toggle" type="button" id="eye1">👁</button>
      <div class="strength-bar"><div class="strength-fill" id="str-fill"></div></div>
      <div class="strength-label" id="str-label"></div>
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="conf-pass" placeholder="Repeat password">
      <button class="pass-toggle" type="button" id="eye2">👁</button>
    </div>

    <button class="btn-full" id="save-btn">
      <div class="spinner"></div>
      <span class="btn-text">Update Password →</span>
    </button>
  </div>

</div>

<script type="module">
import { resetPassword, getPasswordStrength } from './auth.js';
import { supabase } from './api.js';

// ── VERIFY SESSION FROM URL HASH ─────────────────────────────
// Supabase puts access_token + type=recovery in the URL hash
// onAuthStateChange fires with event = 'PASSWORD_RECOVERY'

let recoveryReady = false;

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    recoveryReady = true;
  }
});

// Give Supabase a moment to parse the hash
await new Promise(r => setTimeout(r, 600));

// If no recovery session detected, show invalid view
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  document.getElementById('reset-view').style.display    = 'none';
  document.getElementById('invalid-view').classList.add('show');
}

// ── BIND EVENTS ─────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', doSave);
document.getElementById('eye1').addEventListener('click', () => togglePass('new-pass', 'eye1'));
document.getElementById('eye2').addEventListener('click', () => togglePass('conf-pass', 'eye2'));
document.getElementById('new-pass').addEventListener('input', e => checkStrength(e.target.value));
document.getElementById('conf-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSave();
});

// ── SAVE NEW PASSWORD ────────────────────────────────────────
async function doSave() {
  const newPass  = document.getElementById('new-pass').value;
  const confPass = document.getElementById('conf-pass').value;

  clearAlerts();
  setLoading(true);

  const { success, error } = await resetPassword(newPass, confPass);
  setLoading(false);

  if (error) { showAlert('err', error); return; }

  showAlert('ok', '✓ Password updated! Redirecting to sign in…');
  setTimeout(() => window.location.href = 'login.html?reset=1', 2000);
};

// ── PASSWORD STRENGTH ────────────────────────────────────────
function checkStrength(val) {
  if (!val) {
    document.getElementById('str-fill').style.width = '0';
    document.getElementById('str-label').textContent = '';
    return;
  }
  const s   = getPasswordStrength(val);
  const pct = (s.score / 5) * 100;
  const fill = document.getElementById('str-fill');
  const lbl  = document.getElementById('str-label');
  fill.style.width      = pct + '%';
  fill.style.background = s.color;
  lbl.textContent       = s.label;
  lbl.style.color       = s.color;
};

function togglePass(inputId, eyeId) {
  const inp = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.textContent = inp.type === 'password' ? '👁' : '🙈';
};



function setLoading(on) {
  const btn = document.getElementById('save-btn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

function clearAlerts() {
  ['alert-err','alert-ok'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('show');
    el.textContent = '';
  });
}

function showAlert(type, msg) {
  clearAlerts();
  const el = document.getElementById(`alert-${type}`);
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
